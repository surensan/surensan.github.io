<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css?v=20260611225542" />
</head>
<body class="bg-white text-slate-900 antialiased" data-page="works">
  <header class="site-header">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 md:px-8">
      <a href="index.html#home" class="group flex items-center gap-3" aria-label="返回首页">
        <span class="logo-mark">HM</span>
      </a>

      <div class="hidden items-center gap-7 text-sm text-slate-500 md:flex">
        <a class="nav-link" href="works.html">作品</a>
        <a class="nav-link" href="about.html">关于我</a>
        <a class="nav-link" href="contact.html">联系</a>
        <span class="nav-socials" aria-label="社交链接">
          <a href="https://www.zcool.com.cn/u/14369204" target="_blank" rel="noopener" aria-label="站酷">Z</a>
          <a href="https://www.behance.net/18565191208c1d7" target="_blank" rel="noopener" aria-label="Behance">Be</a>
          <a href="#" aria-label="小红书">Red</a>
        </span>
      </div>

      <button id="mobileMenuBtn" class="menu-button md:hidden" type="button" aria-label="打开菜单" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
    </nav>

    <div id="mobileMenu" class="mobile-menu md:hidden">
      <a href="works.html">作品</a>
      <a href="about.html">关于我</a>
      <a href="contact.html">联系</a>
      <a href="https://www.zcool.com.cn/u/14369204" target="_blank" rel="noopener">站酷</a>
      <a href="https://www.behance.net/18565191208c1d7" target="_blank" rel="noopener">Behance</a>
      <a href="#">小红书</a>
    </div>
  </header>

  <main>
    <section id="works" class="works-library border-b border-slate-200 bg-slate-50">
      <div class="works-library-inner">
        <div class="works-library-head">
          <h1>作品库</h1>
        </div>
        <div class="space-y-5">
          <div class="filter-row" aria-label="作品大类筛选">
            <button class="filter-chip active" data-main-filter="work-detail" type="button">详情页</button>
            <button class="filter-chip" data-main-filter="work-static-render" type="button">三维静态</button>
            <button class="filter-chip" data-main-filter="work-motion-render" type="button">三维动态</button>
            <button class="filter-chip" data-main-filter="work-home" type="button">首页视觉</button>
            <button class="filter-chip" data-main-filter="work-main" type="button">电商主图</button>
            <button class="filter-chip" data-main-filter="work-ppt" type="button">PPT 展示</button>
            <button class="filter-chip" data-main-filter="work-other" type="button">其他</button>
          </div>

          <div id="subFilters" class="filter-row" aria-label="作品子类筛选"></div>
        </div>

        <div id="worksGrid" class="works-grid mt-10"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>Copyright © 2026 San-San Visual Design. All rights reserved.</span>
    <span>Hangzhou, Zhejiang · Visual Designer · 2015-2026.</span>
  </footer>

  <div id="projectModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close-modal></div>
    <button class="modal-nav modal-nav-prev" type="button" aria-label="上一个作品" data-modal-nav="prev">‹</button>
    <article class="modal-card" role="document">
      <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-modal>×</button>
      <img id="modalImage" class="modal-image" src="" alt="" />
      <div class="modal-content">
        <div class="modal-info">
          <p id="modalCategory" class="eyebrow"></p>
          <h2 id="modalTitle"></h2>
          <p id="modalDescription"></p>
          <div id="modalTags" class="modal-tags"></div>
          <div id="modalHistory" class="modal-history"></div>
        </div>
        <div id="modalGallery" class="modal-gallery"></div>
      </div>
    </article>
    <button class="modal-nav modal-nav-next" type="button" aria-label="下一个作品" data-modal-nav="next">›</button>
  </div>

  <script src="extra-projects.js?v=20260611225542"></script>
  <script src="app.js?v=20260611225542"></script>
