<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="黄敏视觉设计师完整作品库，包含平面、品牌、三维静态、动态与其他视觉项目。" />
  <title>作品 | 黄敏视觉设计师作品集</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-white text-slate-900 antialiased">
  <header class="site-header">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 md:px-8">
      <a href="index.html#home" class="group flex items-center gap-3" aria-label="返回首页">
        <span class="logo-mark">HM</span>
        <span class="text-sm font-semibold uppercase tracking-[0.24em] text-slate-900">Huang Min</span>
      </a>

      <div class="hidden items-center gap-7 text-sm text-slate-500 md:flex">
        <a class="nav-link" href="works.html">作品</a>
        <a class="nav-link" href="about.html">关于我</a>
        <a class="nav-link" href="contact.html">联系</a>
        <span class="nav-socials" aria-label="社交链接">
          <a href="#" aria-label="站酷">Z</a>
          <a href="#" aria-label="Behance">Be</a>
          <a href="#" aria-label="小红书">Red</a>
        </span>
      </div>

      <button id="mobileMenuBtn" class="menu-button md:hidden" type="button" aria-label="打开菜单" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
    </nav>

    <div id="mobileMenu" class="mobile-menu md:hidden">
      <a href="works.html">作品</a>
      <a href="about.html">关于我</a>
      <a href="contact.html">联系</a>
      <a href="#">站酷</a>
      <a href="#">Behance</a>
      <a href="#">小红书</a>
    </div>
  </header>

  <main>
    <section id="works" class="border-b border-slate-200 bg-slate-50">
      <div class="mx-auto max-w-7xl px-5 py-20 md:px-8 md:py-28">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Works</p>
            <h1 class="mt-3 text-4xl font-semibold text-slate-950 md:text-6xl">全部作品</h1>
            <p class="mt-6 max-w-2xl text-sm leading-7 text-slate-500">
              这里作为完整作品库使用，后续会继续整理为平面、品牌、三维静态、动态与其他五个方向。首页保留代表作，这里承载更完整的项目记录。
            </p>
          </div>
        </div>

        <div class="mt-12 space-y-5">
          <div class="filter-row" aria-label="作品大类筛选">
            <button class="filter-chip active" data-main-filter="featured" type="button">精选</button>
            <button class="filter-chip" data-main-filter="2d" type="button">平面 / 品牌</button>
            <button class="filter-chip" data-main-filter="3d" type="button">三维静态</button>
          </div>

          <div id="subFilters" class="filter-row" aria-label="作品子类筛选"></div>
        </div>

        <div id="worksGrid" class="works-grid mt-10"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    © 2026 Huang Min. Visual Design Portfolio.
  </footer>

  <div id="projectModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-card" role="document">
      <button class="modal-close" type="button" aria-label="关闭弹窗" data-close-modal>×</button>
      <img id="modalImage" class="modal-image" src="" alt="" />
      <div class="modal-content">
        <div class="modal-info">
          <p id="modalCategory" class="eyebrow"></p>
          <h2 id="modalTitle"></h2>
          <p id="modalDescription"></p>
          <div id="modalTags" class="modal-tags"></div>
          <div id="modalHistory" class="modal-history"></div>
        </div>
        <div id="modalGallery" class="modal-gallery"></div>
      </div>
    </article>
  </div>

  <script src="extra-projects.js"></script>
  <script src="app.js"></script>
</body>
</html>
